<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LegalConnect Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

      .login-screen {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 20px;
      }
      .login-box {
        background: #1e293b; border: 1px solid #334155;
        border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
      }
      .login-logo {
        display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
      }
      .login-logo-icon {
        width: 44px; height: 44px; background: #c9963a; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.2rem; font-weight: 700; color: #0f172a;
      }
      .login-logo-text { font-size: 1.2rem; font-weight: 700; color: white; }
      .login-logo-text span { color: #c9963a; }
      .login-subtitle { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
      .form-group { margin-bottom: 16px; }
      .form-label { display: block; font-size: 0.82rem; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
      .form-input {
        width: 100%; padding: 11px 14px; background: #0f172a;
        border: 1.5px solid #334155; border-radius: 8px;
        color: #e2e8f0; font-size: 0.92rem; transition: border-color 0.2s;
      }
      .form-input:focus { outline: none; border-color: #c9963a; }
      .btn-login {
        width: 100%; padding: 12px; background: #c9963a; color: #0f172a;
        border: none; border-radius: 8px; font-size: 0.95rem;
        font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px;
      }
      .btn-login:hover { background: #e8b050; }
      .error-msg {
        background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5;
        padding: 10px 14px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 16px;
      }

      .dashboard { display: none; }
      .topbar {
        background: #1e293b; border-bottom: 1px solid #334155;
        padding: 0 24px; height: 60px;
        display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; z-index: 10;
      }
      .topbar-left { display: flex; align-items: center; gap: 12px; }
      .topbar-logo { font-size: 1.1rem; font-weight: 700; color: white; }
      .topbar-logo span { color: #c9963a; }
      .admin-badge {
        background: rgba(201,150,58,0.15); color: #c9963a;
        border: 1px solid rgba(201,150,58,0.3);
        padding: 3px 10px; border-radius: 100px; font-size: 0.72rem; font-weight: 600;
      }
      .btn-logout {
        padding: 7px 16px; background: transparent; color: #94a3b8;
        border: 1px solid #334155; border-radius: 8px; cursor: pointer;
        font-size: 0.82rem; transition: all 0.2s;
      }
      .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

      .main { padding: 32px 24px; max-width: 1200px; margin: 0 auto; }
      .page-title { font-size: 1.6rem; font-weight: 700; color: white; margin-bottom: 6px; }
      .page-sub { color: #64748b; font-size: 0.88rem; margin-bottom: 32px; }

      .stats-grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px; margin-bottom: 32px;
      }
      .stat-card {
        background: #1e293b; border: 1px solid #334155;
        border-radius: 12px; padding: 20px;
      }
      .stat-value { font-size: 1.8rem; font-weight: 700; color: white; }
      .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

      .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
      .tab {
        padding: 8px 20px; border-radius: 8px; font-size: 0.85rem;
        font-weight: 500; cursor: pointer; border: none;
        background: transparent; color: #64748b; transition: all 0.2s;
      }
      .tab.active { background: #c9963a; color: #0f172a; font-weight: 700; }
      .tab:hover:not(.active) { background: #1e293b; color: #e2e8f0; }

      .lawyers-list { display: flex; flex-direction: column; gap: 16px; }
      .lawyer-item {
        background: #1e293b; border: 1px solid #334155;
        border-radius: 12px; padding: 24px;
        display: flex; gap: 20px; align-items: flex-start;
        transition: border-color 0.2s;
      }
      .lawyer-item:hover { border-color: #475569; }
      .lawyer-avatar {
        width: 52px; height: 52px; border-radius: 50%;
        background: linear-gradient(135deg, #1a2e4a, #243d5f);
        display: flex; align-items: center; justify-content: center;
        color: #c9963a; font-size: 1.1rem; font-weight: 700;
        flex-shrink: 0;
      }
      .lawyer-info { flex: 1; min-width: 0; }
      .lawyer-name { font-weight: 600; color: white; font-size: 1rem; margin-bottom: 4px; }
      .lawyer-spec {
        font-size: 0.72rem; color: #c9963a; text-transform: uppercase;
        letter-spacing: 0.08em; margin-bottom: 10px;
      }
      .lawyer-details { display: flex; flex-wrap: wrap; gap: 16px; }
      .lawyer-detail { font-size: 0.8rem; color: #94a3b8; }
      .lawyer-detail strong { color: #e2e8f0; }
      .lawyer-bio { font-size: 0.82rem; color: #64748b; margin-top: 8px; line-height: 1.6; }

      .status-badge {
        padding: 4px 12px; border-radius: 100px;
        font-size: 0.72rem; font-weight: 600; flex-shrink: 0;
      }
      .status-pending { background: #451a03; color: #fb923c; border: 1px solid #7c2d12; }
      .status-approved { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
      .status-rejected { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }

      .action-buttons { display: flex; gap: 8px; flex-direction: column; flex-shrink: 0; }
      .btn-approve {
        padding: 8px 18px; background: #16a34a; color: white;
        border: none; border-radius: 8px; cursor: pointer;
        font-size: 0.82rem; font-weight: 600; transition: all 0.2s;
      }
      .btn-approve:hover { background: #15803d; }
      .btn-reject {
        padding: 8px 18px; background: transparent; color: #ef4444;
        border: 1px solid #ef4444; border-radius: 8px; cursor: pointer;
        font-size: 0.82rem; font-weight: 600; transition: all 0.2s;
      }
      .btn-reject:hover { background: #ef4444; color: white; }
      .btn-verify {
        padding: 8px 18px; background: transparent; color: #c9963a;
        border: 1px solid #c9963a; border-radius: 8px; cursor: pointer;
        font-size: 0.82rem; font-weight: 600; transition: all 0.2s;
        text-decoration: none; text-align: center;
      }
      .btn-verify:hover { background: #c9963a; color: #0f172a; }

      .empty-state {
        text-align: center; padding: 60px 20px; color: #475569;
      }
      .empty-state h3 { font-size: 1rem; margin-bottom: 8px; color: #64748b; }

      .loading { text-align: center; padding: 40px; color: #64748b; }

      .notification {
        position: fixed; bottom: 24px; right: 24px;
        padding: 14px 20px; border-radius: 10px;
        font-size: 0.88rem; font-weight: 500; z-index: 999;
        animation: slideIn 0.3s ease;
        display: none;
      }
      .notification.success { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
      .notification.error { background: #450a0a; color: #f87171; border: 1px solid #ef4444; }
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 600px) {
        .lawyer-item { flex-direction: column; }
        .action-buttons { flex-direction: row; flex-wrap: wrap; width: 100%; }
        .btn-approve, .btn-reject, .btn-verify { flex: 1; text-align: center; }
      }
    </style>
  </head>
  <body>
    <div class="login-screen" id="loginScreen">
      <div class="login-box">
        <div class="login-logo">
          <div class="login-logo-icon">⚖</div>
          <div>
            <div class="login-logo-text">Legal<span>Connect</span></div>
            <div class="login-subtitle">Admin Control Panel</div>
          </div>
        </div>
        <div id="loginError" class="error-msg" style="display:none"></div>
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input class="form-input" type="email" id="adminEmail" placeholder="admin@legalconnect.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Admin Password</label>
          <input class="form-input" type="password" id="adminPassword" placeholder="••••••••" />
        </div>
        <button class="btn-login" onclick="adminLogin()">Login to Admin Panel</button>
      </div>
    </div>

    <div class="dashboard" id="dashboard">
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-logo">Legal<span>Connect</span></div>
          <span class="admin-badge">ADMIN</span>
        </div>
        <button class="btn-logout" onclick="adminLogout()">Logout</button>
      </div>

      <div class="main">
        <div class="page-title">Admin Dashboard</div>
        <div class="page-sub">Manage lawyer registrations and platform users</div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="statPending">-</div>
            <div class="stat-label">Pending Review</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statApproved">-</div>
            <div class="stat-label">Approved Lawyers</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statRejected">-</div>
            <div class="stat-label">Rejected</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statCustomers">-</div>
            <div class="stat-label">Total Customers</div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab active" onclick="switchTab('pending')"> Pending</button>
          <button class="tab" onclick="switchTab('approved')"> Approved</button>
          <button class="tab" onclick="switchTab('rejected')"> Rejected</button>
          <button class="tab" onclick="switchTab('all')">👥 All Lawyers</button>
        </div>

        <div class="lawyers-list" id="lawyersList">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
      const SUPABASE_URL = 'https://mxdchrfikpadudarfkvl.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGNocmZpa3BhZHVkYXJma3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDY4MjAsImV4cCI6MjA5ODIyMjgyMH0.11QRCp_WnNOQXefC6Y89MuTHkMianrNHkb-s56TZfvc';
      const ADMIN_EMAIL = 'jsoncontent@gmail.com';

      const { createClient } = supabase;
      const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let currentTab = 'pending';
      let allLawyers = [];

      async function adminLogin() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value.trim();
        const errorEl = document.getElementById('loginError');

        errorEl.style.display = 'none';

        if (!email || !password) {
          errorEl.textContent = 'Please enter email and password.';
          errorEl.style.display = 'block';
          return;
        }

        if (email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
          errorEl.textContent = 'Access denied. You are not authorized.';
          errorEl.style.display = 'block';
          return;
        }

        const { data, error } = await db.auth.signInWithPassword({ email, password });

        if (error) {
          errorEl.textContent = error.message;
          errorEl.style.display = 'block';
          return;
        }

        showDashboard();
        loadData();
      }

      async function adminLogout() {
        await db.auth.signOut();
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
      }

      async function checkSession() {
        const { data: { session } } = await db.auth.getSession();
        if (session?.user?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
          showDashboard();
          loadData();
        }
      }

      function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      }

      async function loadData() {
        document.getElementById('lawyersList').innerHTML = '<div class="loading">Loading lawyers...</div>';

        const { data, error } = await db
          .from('lawyer_profiles')
          .select('*, profiles(id, full_name, email, created_at)')
          .order('status', { ascending: true });

        if (error) {
          showNotification('Failed to load lawyers: ' + error.message, 'error');
          return;
        }

        allLawyers = data || [];
        updateStats();
        renderLawyers();
      }

      function updateStats() {
        document.getElementById('statPending').textContent = allLawyers.filter(l => l.status === 'pending').length;
        document.getElementById('statApproved').textContent = allLawyers.filter(l => l.status === 'approved').length;
        document.getElementById('statRejected').textContent = allLawyers.filter(l => l.status === 'rejected').length;

        db.from('profiles').select('id', { count: 'exact', head: true }).eq('role', 'customer').then(({ count }) => {
          document.getElementById('statCustomers').textContent = count || 0;
        });
      }

      function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderLawyers();
      }

      function renderLawyers() {
        const list = document.getElementById('lawyersList');
        let lawyers = allLawyers;

        if (currentTab !== 'all') {
          lawyers = allLawyers.filter(l => l.status === currentTab);
        }

        if (lawyers.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <h3>No lawyers in this category</h3>
              <p>Check back later or switch tabs.</p>
            </div>`;
          return;
        }

        list.innerHTML = lawyers.map(lawyer => {
          const name = lawyer.profiles?.full_name || 'Unknown';
          const email = lawyer.profiles?.email || '';
          const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
          const registeredDate = lawyer.profiles?.created_at ? new Date(lawyer.profiles.created_at).toLocaleDateString() : 'N/A';

          return `
            <div class="lawyer-item" id="lawyer-${lawyer.id}">
              <div class="lawyer-avatar">${initials}</div>
              <div class="lawyer-info">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
                  <div class="lawyer-name">${name}</div>
                  ${lawyer.verified ? '<span style="background:#052e16;color:#4ade80;border:1px solid #16a34a;padding:2px 8px;border-radius:100px;font-size:0.65rem;font-weight:700;">✓ GOV VERIFIED</span>' : ''}
                </div>
                <div class="lawyer-spec">${lawyer.specialization || 'N/A'}</div>
                <div class="lawyer-details">
                  <div class="lawyer-detail">📧 <strong>${email}</strong></div>
                  <div class="lawyer-detail">📍 <strong>${lawyer.location || 'N/A'}</strong></div>
                  <div class="lawyer-detail">⚖️ Bar No: <strong>${lawyer.bar_number || 'N/A'}</strong></div>
                  <div class="lawyer-detail">🕐 <strong>${lawyer.experience || 0} yrs exp</strong></div>
                  <div class="lawyer-detail">💵 <strong>$${lawyer.hourly_rate || 0}/hr</strong></div>
                  <div class="lawyer-detail">📅 Registered: <strong>${registeredDate}</strong></div>
                </div>
                ${lawyer.bio ? `<div class="lawyer-bio">${lawyer.bio}</div>` : ''}
              </div>
              <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
                <span class="status-badge status-${lawyer.status}">${lawyer.status.toUpperCase()}</span>
                <div class="action-buttons">
                  ${lawyer.status !== 'approved' ? `<button class="btn-approve" onclick="updateStatus('${lawyer.id}', 'approved')">✅ Approve</button>` : ''}
                  ${lawyer.status !== 'rejected' ? `<button class="btn-reject" onclick="updateStatus('${lawyer.id}', 'rejected')">❌ Reject</button>` : ''}
                  <button class="btn-verify" onclick="toggleVerified('${lawyer.id}', ${!lawyer.verified})">
                    ${lawyer.verified ? '🔒 Unverify' : '🏛️ Mark Gov Verified'}
                  </button>
                  <a class="btn-verify" href="https://ewakili.judiciary.go.tz/#/ewakili/home" target="_blank">🔍 Check eWakili</a>
                </div>
              </div>
            </div>`;
        }).join('');
      }

      async function updateStatus(lawyerId, status) {
        const { error } = await db.from('lawyer_profiles').update({ status }).eq('id', lawyerId);

        if (error) {
          showNotification('Error: ' + error.message, 'error');
          return;
        }

        const lawyer = allLawyers.find(l => l.id === lawyerId);
        if (lawyer) lawyer.status = status;

        updateStats();
        renderLawyers();
        showNotification(status === 'approved' ? ' Lawyer approved successfully!' : '❌ Lawyer rejected.', status === 'approved' ? 'success' : 'error');
      }

      async function toggleVerified(lawyerId, verified) {
        const { error } = await db.from('lawyer_profiles').update({ verified }).eq('id', lawyerId);

        if (error) {
          showNotification('Error: ' + error.message, 'error');
          return;
        }

        const lawyer = allLawyers.find(l => l.id === lawyerId);
        if (lawyer) lawyer.verified = verified;

        renderLawyers();
        showNotification(verified ? ' Marked as Government Verified!' : '🔒 Verification removed.', 'success');
      }

      function showNotification(message, type) {
        const el = document.getElementById('notification');
        el.textContent = message;
        el.className = `notification ${type}`;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3500);
      }

      checkSession();
    </script>
  </body>
</html>
